<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Resume Template</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="resume modern-resume">
        <aside class="sidebar">
            <h1>{{ name }}</h1>
            <p>{{ target_role }}</p>
            <p>{{ email }}</p>
            <p>{{ phone }}</p>
        </aside>

        <section class="content">
            <h2>Profile</h2>
            <p>{{ summary }}</p>
        </section>
    </main>
</body>
</html>
